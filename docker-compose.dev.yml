# Development override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      RATE_LIMIT_MAX: 1000
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./data:/app/data

  db:
    ports:
      - "5432:5432"

  # --- Adminer (DB GUI) ---
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped
