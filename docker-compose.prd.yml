# Production override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d

services:
  app:
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      RATE_LIMIT_MAX: 60
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  postgres:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  tunnel-app:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
