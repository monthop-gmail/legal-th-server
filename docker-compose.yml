services:
  # --- MCP Server ---
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://legal_th:legal_th_pass@db:5432/legal_th
      API_KEY_SALT: change-this-in-production
      RATE_LIMIT_MAX: 60
      RATE_LIMIT_WINDOW_MS: 60000
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: legal_th
      POSTGRES_PASSWORD: legal_th_pass
      POSTGRES_DB: legal_th
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_th"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Redis (Phase 2: caching + rate limiting) ---
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redisdata:/data
  #   restart: unless-stopped

volumes:
  pgdata:
  # redisdata:
