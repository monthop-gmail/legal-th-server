# Root compose — modular pattern (Docker Compose v2.20+)
# แต่ละ service อยู่ใน services/*/compose.yaml
#
# Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Prd:  docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d

include:
  - path: ./services/app/compose.yaml
  - path: ./services/postgres/compose.yaml
  # - path: ./services/redis/compose.yaml        # Phase 2: เปิดเมื่อพร้อม
  - path: ./services/tunnels/compose.yaml

networks:
  legal-th-net:
    driver: bridge
    name: legal-th-net
