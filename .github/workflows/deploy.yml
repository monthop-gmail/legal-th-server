name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  # ─── Build & Test ───
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run 2>&1 || echo "No test files found, skipping"

  # ─── Deploy (ทำงานเฉพาะเมื่อตั้ง secrets แล้ว) ───
  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prd" >> $GITHUB_OUTPUT
            echo "deploy_host=DEPLOY_HOST_PRD" >> $GITHUB_OUTPUT
          else
            echo "environment=test" >> $GITHUB_OUTPUT
            echo "deploy_host=DEPLOY_HOST_TEST" >> $GITHUB_OUTPUT
          fi

      - name: Check deploy secrets
        id: check
        run: |
          if [[ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⏭️ Deploy skipped — DEPLOY_SSH_KEY not configured"
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[steps.env.outputs.deploy_host] }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/services/legal-th-server
            git pull origin ${{ github.ref_name }}

            # Decrypt secrets
            export SOPS_AGE_KEY="${{ secrets.SOPS_AGE_KEY }}"
            sops --decrypt .env.enc > .env

            # Deploy with production override
            docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d --build

            # Verify health
            sleep 10
            curl -f http://localhost:3000/health || exit 1
