# SOPS config — กำหนด public keys ที่มีสิทธิ์ decrypt
# วิธีใช้:
#   1. ติดตั้ง: brew install sops age (หรือ apt install age)
#   2. สร้าง key: age-keygen -o keys.txt
#   3. เพิ่ม public key ข้างล่าง
#   4. Encrypt: sops --encrypt .env > .env.enc
#   5. Decrypt: sops --decrypt .env.enc > .env
#
# Key location: ~/.config/sops/age/keys.txt
# Shell env: export SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt

creation_rules:
  - path_regex: \.env\.enc$
    age: >-
      age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    # เพิ่ม public key ของสมาชิกทีมทุกคน (คั่นด้วย comma)
    # age1abc...,age1def...,age1ghi...
