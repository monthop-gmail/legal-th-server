services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legal_th}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legal_th_pass}
      POSTGRES_DB: ${POSTGRES_DB:-legal_th}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legal_th}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - legal-th-net
    restart: unless-stopped

volumes:
  pgdata:
